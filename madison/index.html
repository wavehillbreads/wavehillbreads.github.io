<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="WHB Markets">
<title>Wave Hill Breads — Madison 051526</title>
<style>
:root{--g:#1D9E75;--gl:#EAF3DE;--gd:#27500A;--gm:#085041;--r:#A32D2D;--rl:#FCEBEB;--a:#633806;--al:#FAEEDA;--ab:#EF9F27;--t:#1a1a1a;--tm:#666;--b:rgba(0,0,0,0.12);--bs:rgba(0,0,0,0.22);--bg:#f5f5f0;--s:#fff;--s2:#f0efea;--rad:10px;--radl:14px}
@media(prefers-color-scheme:dark){:root{--t:#f0f0f0;--tm:#aaa;--b:rgba(255,255,255,0.12);--bs:rgba(255,255,255,0.22);--bg:#1a1a1a;--s:#252525;--s2:#2e2e2e;--gl:#0a2a1a;--gd:#9FE1CB;--rl:#2a0a0a;--al:#2a1a00}}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:var(--bg);font-family:-apple-system,BlinkMacSystemFont,'Helvetica Neue',sans-serif;color:var(--t);font-size:16px}
.screen{display:none;min-height:100vh;padding-bottom:40px}.screen.active{display:block}
.topbar{background:var(--s);border-bottom:0.5px solid var(--b);padding:12px 16px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:10}
.back{font-size:15px;color:var(--g);background:none;border:none;padding:4px 0;cursor:pointer;font-family:inherit}
.title{flex:1;font-size:17px;font-weight:600}
.steps{display:flex;background:var(--s);border-bottom:0.5px solid var(--b)}
.sb{flex:1;padding:11px 4px;font-size:12px;font-weight:500;color:var(--tm);background:none;border:none;border-bottom:2px solid transparent;cursor:pointer;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:5px}
.sb .n{width:18px;height:18px;border-radius:50%;background:var(--s2);font-size:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.sb.active{color:var(--t);border-bottom-color:var(--g)}.sb.active .n{background:var(--g);color:#fff}.sb.done .n{background:#639922;color:#fff}
.sumbar{background:var(--s2);padding:12px 16px;display:flex;justify-content:space-between;border-bottom:0.5px solid var(--b)}
.sumbar .i .l{font-size:11px;color:var(--tm);margin-bottom:2px}.sumbar .i .v{font-size:20px;font-weight:600}
.slbl{font-size:11px;font-weight:600;color:var(--tm);letter-spacing:.06em;text-transform:uppercase;padding:14px 16px 6px}
.sw{padding:8px 16px;background:var(--s);border-bottom:0.5px solid var(--b);position:sticky;top:57px;z-index:9}
.sw input{width:100%;padding:8px 12px;background:var(--s2);border:0.5px solid var(--b);border-radius:10px;font-size:15px;color:var(--t);font-family:inherit;outline:none}
.pc{background:var(--s);border-bottom:0.5px solid var(--b);padding:13px 16px 13px 19px;border-left:3px solid transparent}
.pc.flagged{border-left-color:#E24B4A}.pc.done{border-left-color:#639922}.pc.so{opacity:.4}
.pn{font-size:15px;font-weight:600;margin-bottom:2px}.pm{font-size:12px;color:var(--tm);margin-bottom:10px}
.pctrl{display:flex;gap:12px;align-items:flex-end}
.cg{display:flex;flex-direction:column;gap:4px}.cg .l{font-size:11px;color:var(--tm)}
.stpr{display:flex;align-items:center;gap:6px}
.stpr button{width:34px;height:34px;border-radius:8px;border:0.5px solid var(--bs);background:var(--s);color:var(--t);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-family:inherit;line-height:1}
.stpr button:active{background:var(--s2);transform:scale(.95)}.stpr .v{font-size:18px;font-weight:600;min-width:30px;text-align:center}
.vr{color:#A32D2D}.vg{color:var(--gm)}
.br{margin-left:auto;text-align:right}.br .big{font-size:22px;font-weight:700}.br .sm{font-size:11px;color:var(--tm)}
.sa{margin-left:auto;text-align:right}.sa .big{font-size:22px;font-weight:700;color:var(--gm)}.sa .sm{font-size:11px;color:var(--tm)}
.alert{background:var(--al);border:0.5px solid var(--ab);border-radius:var(--rad);margin:12px 16px 4px;padding:11px 14px;font-size:13px;color:var(--a)}
.cbr{background:var(--s);border-bottom:0.5px solid var(--b);padding:13px 16px;display:flex;justify-content:space-between;align-items:center}
.cbr .l{font-size:15px}.cbi{display:flex;align-items:center;gap:4px}.cbi .sym{font-size:15px;color:var(--tm)}
.cbi input{width:100px;font-size:15px;font-weight:500;text-align:right;padding:6px 10px;border:0.5px solid var(--bs);border-radius:8px;background:var(--s);color:var(--t);font-family:inherit;outline:none}
.rc{background:var(--s);border-radius:var(--radl);border:0.5px solid var(--b);margin:4px 16px 12px;overflow:hidden}
.rr{display:flex;justify-content:space-between;padding:11px 16px;border-bottom:0.5px solid var(--b);font-size:14px}
.rr:last-child{border-bottom:none;font-weight:600;font-size:15px}.rr .neg{color:var(--r)}
.tu{margin:0 16px 16px;border-radius:var(--radl);padding:18px;text-align:center}
.tu.over{background:var(--gl)}.tu.short{background:var(--rl)}
.tu .tl{font-size:12px;font-weight:600;letter-spacing:.04em;text-transform:uppercase}
.tu.over .tl{color:#3B6D11}.tu.short .tl{color:var(--r)}
.tu .ta{font-size:34px;font-weight:700;margin:4px 0}
.tu.over .ta{color:var(--gd)}.tu.short .ta{color:var(--r)}
.nw{margin:0 16px 12px}.nw label{font-size:12px;color:var(--tm);display:block;margin-bottom:5px}
.nw textarea{width:100%;padding:10px 12px;border:0.5px solid var(--bs);border-radius:var(--rad);font-size:14px;color:var(--t);background:var(--s);font-family:inherit;resize:none;outline:none}
.ab{padding:12px 16px;display:flex;flex-direction:column;gap:8px}
.btn{width:100%;padding:15px;font-size:16px;font-weight:600;border:none;border-radius:var(--radl);cursor:pointer;font-family:inherit}
.btn:active{transform:scale(.98)}.btnp{background:var(--g);color:#fff}.btns{background:var(--s2);color:var(--t);border:0.5px solid var(--bs)}
.hh{padding:28px 20px 16px}.hh .logo{font-size:26px;font-weight:700;margin-bottom:4px}.hh .tag{font-size:14px;color:var(--tm)}
.mc{background:var(--s);border:0.5px solid var(--b);border-radius:var(--radl);margin:0 16px 12px;padding:16px;cursor:pointer}
.mc:active{background:var(--s2)}.mc .mn{font-size:17px;font-weight:600;margin-bottom:4px}.mc .mm{font-size:13px;color:var(--tm);margin-bottom:10px}
.mc .mp{display:inline-block;font-size:12px;font-weight:500;padding:3px 10px;border-radius:20px;background:var(--s2);color:var(--tm);border:0.5px solid var(--b)}
.dw{padding:40px 20px;text-align:center}
.di{width:64px;height:64px;background:var(--gl);border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 18px}
.dt{font-size:24px;font-weight:700;margin-bottom:6px}.ds2{font-size:14px;color:var(--tm);margin-bottom:24px}
.dsm{background:var(--s);border-radius:var(--radl);border:0.5px solid var(--b);padding:16px;text-align:left;margin-bottom:20px}
.sg{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
.sx{background:var(--s2);border-radius:var(--rad);padding:12px;text-align:center}.sx .sl{font-size:11px;color:var(--tm);margin-bottom:4px}.sx .sv{font-size:22px;font-weight:700}
.dr{display:flex;justify-content:space-between;padding:6px 0;font-size:14px;border-bottom:0.5px solid var(--b)}.dr:last-child{border-bottom:none;font-weight:600}
</style>
</head>
<body>
<div id="sh" class="screen active">
  <div class="hh"><div class="logo">Wave Hill Breads</div><div class="tag">Market day tracker</div></div>
  <div style="padding:0 16px 8px;font-size:11px;font-weight:600;color:var(--tm);text-transform:uppercase;letter-spacing:.06em">Today’s market</div>
  <div class="mc" onclick="startMarket()">
    <div class="mn">Madison 051526 Farmers Market</div>
    <div class="mm">Terrell · 41 items · $1,940</div>
    <span class="mp" id="hs">Not started</span>
  </div>
  <div style="padding:20px 16px 0;font-size:13px;color:var(--tm);text-align:center" id="home-hint">Tap to begin your day</div>
  <div id="resume-banner" style="display:none;margin:10px 16px 0;padding:10px 14px;background:#EAF3DE;border-radius:10px;font-size:13px;color:#27500A;font-weight:500;text-align:center">↻ Saved progress found — tap market to resume</div>
</div>
<div id="sm" class="screen">
  <div class="topbar">
    <button class="back" onclick="goHome()">← Home</button>
    <div style="flex:1"><div class="title">Madison 051526</div></div>
    <div style="font-size:12px;color:var(--tm)" id="pl">0 / 41</div>
  </div>
  <div class="steps">
    <button class="sb active" id="p1" onclick="goStep(1)"><span class="n">1</span>Departure</button>
    <button class="sb" id="p2" onclick="goStep(2)"><span class="n">2</span>Market</button>
    <button class="sb" id="p3" onclick="goStep(3)"><span class="n">3</span>Cashbox</button>
  </div>
  <div id="sc"></div>
</div>
<div id="sd" class="screen">
  <div class="dw">
    <div class="di"><svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#27500A" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg></div>
    <div class="dt">Day complete!</div>
    <div class="ds2">Madison 051526 · </div>
    <div class="dsm" id="dsm"></div>
    <button class="btn btns" onclick="goHome()">Back to home</button>
  </div>
</div>
<script>
const PRODUCTS=[{"code":"Brioche Loaf","name":"Brioche Loaf (Unsliced)","qty":1,"price":14,"pizza":false},{"code":"Braided Challah Loaf","name":"Braided Challah Loaf (Long)","qty":3,"price":8,"pizza":false},{"code":"Cookie Choc Chip","name":"Cookie Chocolate Chip","qty":20,"price":4,"pizza":false},{"code":"Cookie Oatmeal","name":"Cookies Oatmeal","qty":15,"price":4,"pizza":false},{"code":"Cookie Snicker-do","name":"Cookies Snickerdoodle","qty":6,"price":4,"pizza":false},{"code":"IB Rom Foc Personal","name":"IB Roman Foc Personal Size","qty":8,"price":8,"pizza":false},{"code":"IB Rom Foc Rosemary","name":"IB Roman Focaccia with Rosmary Personal Size","qty":8,"price":8,"pizza":false},{"code":"SEM 20oz","name":"Semolina Batard - 20oz","qty":4,"price":10,"pizza":false},{"code":"WHB MU Pan","name":"Multigrain Pan Loaf (Sliced)","qty":3,"price":10,"pizza":false},{"code":"WHB 10 Demi","name":"Three Grain Demi Baguette (10oz)","qty":6,"price":5,"pizza":false},{"code":"WHB 20","name":"ThreeGrain Country batard  (20oz)","qty":3,"price":10,"pizza":false},{"code":"WHB 24 Baquette","name":"ThreeGrain Full Baguette 24 inch","qty":8,"price":6,"pizza":false},{"code":"WHB Cia","name":"ThreeGrain Ciabatta Roasted Red Pepper and Olive","qty":7,"price":10,"pizza":false},{"code":"WHB Cranberry Wal","name":"ThreeGrain Cranberry Walnut Demi","qty":3,"price":7,"pizza":false},{"code":"WHB Epi Med.","name":"ThreeGrain Medium Epi (16 oz)","qty":3,"price":10,"pizza":false},{"code":"WHB Garlic 20oz","name":"ThreeGrain Garlic  (20oz)","qty":4,"price":12,"pizza":false},{"code":"WHB Half Mega (Sli)","name":"Three Grain Half  Mega (Sliced)","qty":1,"price":10,"pizza":false},{"code":"WHB Three-Cheese","name":"Three-Cheese Demi-Baguette (10oz)","qty":2,"price":7,"pizza":false},{"code":"Pan Cin Buttermilk","name":"Buttermilk Cinnamon Raisin Pan Loaf (Unsliced)","qty":1,"price":12,"pizza":false},{"code":"PAN HWW Sli","name":"Honey Whole Wheat Loaf  (Sliced)","qty":2,"price":10,"pizza":false},{"code":"Pan White (sl)","name":"Buttermilk Honey White Sandwich Loaf (Sliced)","qty":2,"price":10,"pizza":false},{"code":"Pan Wild (Sliced)","name":"Wild Yeast Sourdough Pan Loaf (Sliced)","qty":15,"price":10,"pizza":false},{"code":"PC","name":"Croissant Plain","qty":20,"price":5,"pizza":false},{"code":"PC 2x Almond","name":"PC 2x Baked Almond Croissant","qty":10,"price":6.5,"pizza":false},{"code":"PC Apple Turnonver","name":"Apple Turnover","qty":4,"price":6,"pizza":false},{"code":"PC CH","name":"Croissant Chocolate","qty":25,"price":6,"pizza":false},{"code":"PC Monkey Bread","name":"Monkey Bread","qty":30,"price":7,"pizza":false},{"code":"PC Monkey Cheese","name":"Three-Cheese Monkey Breads","qty":20,"price":7,"pizza":false},{"code":"PM Berry","name":"Berry Muffin","qty":1,"price":4,"pizza":false},{"code":"PS Vanilla","name":"Vanilla Scone","qty":6,"price":4,"pizza":false},{"code":"Pizza M","name":"Margherita Pizza","qty":8,"price":15,"pizza":true},{"code":"Pizza mini","name":"Mini Pizzettes","qty":3,"price":5,"pizza":false},{"code":"Pizza S","name":"Sausage Pizza","qty":3,"price":18,"pizza":true},{"code":"Pizza V","name":"Veggie Pizza","qty":3,"price":18,"pizza":true},{"code":"Pizza Z","name":"Zucchini Pizza","qty":3,"price":18,"pizza":true},{"code":"Miche","name":"Sourdough Miche - Quarter (Unsliced)","qty":8,"price":8,"pizza":false},{"code":"Miche - Quarter(Slic","name":"Wild Yeast Sourdough Miche -  Quarter (Sliced)","qty":15,"price":10,"pizza":false},{"code":"Wild 24’’ Bag","name":"Wild  Yeast Sourdough Baguette","qty":3,"price":7,"pizza":false},{"code":"Wild Boule","name":"Wild  Yeast Sourdough Boule (16oz)","qty":2,"price":7,"pizza":false},{"code":"Wild Kalamata","name":"Wild Yeast Kalamata Boule","qty":3,"price":12,"pizza":false},{"code":"Wild Yeast Loaf","name":"Wild  Yeast Sourdough Batard","qty":6,"price":10,"pizza":false}];
const MARKET_NAME="Madison 051526";
const MARKET_DATE="";
const MARKET_REPS="Terrell";
const MARKET_TARGET=1940;
const SAVE_KEY='whb_'+MARKET_NAME.replace(/\s+/g,'_');
const BACKEND_URL='https://script.google.com/macros/s/AKfycbwgCKX6eMHvQk5t11UsN9fpoCgbL77CAVPcXWIGSiJX_cFpyUn9YVjFeSRY3Nffyp_viA/exec';
let S={step:1,shorts:{},adds:{},trades:{},leftovers:{},cash:0,cards:0,checks:0,coins:0,marketFee:0,discounts:0,startingCash:100,notes:''};
function saveState(){try{localStorage.setItem(SAVE_KEY,JSON.stringify(S));}catch(e){}}
function loadState(){try{const sv=localStorage.getItem(SAVE_KEY);if(sv){const p=JSON.parse(sv);if(p&&p.shorts){S=p;return true;}}return false;}catch(e){return false;}}
function clearState(){try{localStorage.removeItem(SAVE_KEY);}catch(e){}}
const $=id=>document.getElementById(id);
function showScreen(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));$(id).classList.add('active');window.scrollTo(0,0)}
function goHome(){showScreen('sh')}
function startMarket(){$('hs').textContent='In progress';$('hs').style.cssText='background:#EAF3DE;color:#27500A';showScreen('sm');if(loadState()){goStep(S.step||1);}else{goStep(1);}}
function tb(p){return Math.max(0,p.qty-(S.shorts[p.code]||0)+(S.adds[p.code]||0))}
function ds(p){const t=tb(p);return Math.max(0,(t-(S.trades[p.code]||0)-(S.leftovers[p.code]||0))*p.price)}
function totalSales(){return PRODUCTS.reduce((s,p)=>s+ds(p),0)}
function pizzaSold(){return PRODUCTS.filter(p=>p.pizza).reduce((s,p)=>s+Math.max(0,tb(p)-(S.leftovers[p.code]||0)-(S.trades[p.code]||0)),0)}
function pizzaBonus(){const ps=pizzaSold();return ps>10?(ps-10)*2:0}
function numLogged(){return PRODUCTS.filter(p=>S.leftovers[p.code]!==undefined||S.trades[p.code]!==undefined).length}
function adj(field,idx,delta,min,max){const code=PRODUCTS[idx].code;S[field][code]=Math.max(min,Math.min(max,(S[field][code]||0)+delta));saveState();goStep(S.step)}
function goStep(n){S.step=n;saveState();[1,2,3].forEach(i=>{const b=$('p'+i);b.classList.remove('active','done');if(i<n)b.classList.add('done');if(i===n)b.classList.add('active')});if(n===1)r1();if(n===2)r2();if(n===3)r3();$('pl').textContent=numLogged()+' / '+PRODUCTS.length}
function r1(){
  const shorts=PRODUCTS.filter(p=>(S.shorts[p.code]||0)>0);
  const tI=PRODUCTS.reduce((s,p)=>s+p.qty*p.price,0),tB=PRODUCTS.reduce((s,p)=>s+tb(p)*p.price,0);
  let h='';
  if(shorts.length)h+=`<div class="alert"><strong>${shorts.length} item${shorts.length>1?'s':''} short</strong> — update before leaving the bakery</div>`;
  h+=`<div class="sumbar"><div class="i"><div class="l">Invoice value</div><div class="v">$${tI.toLocaleString('en-US',{maximumFractionDigits:0})}</div></div><div class="i" style="text-align:right"><div class="l">Bringing</div><div class="v">$${tB.toLocaleString('en-US',{maximumFractionDigits:0})}</div></div></div>`;
  h+=`<div class="sw"><input type="text" placeholder="Search products…" oninput="fl('dl',this.value)" autocomplete="off" autocorrect="off" spellcheck="false"></div>`;
  h+=`<div class="slbl">Confirm what’s on the truck</div><div id="dl">`;
  PRODUCTS.forEach((p,i)=>{const sh=S.shorts[p.code]||0,ad=S.adds[p.code]||0,t=tb(p);
    h+=`<div class="pc ${sh>0?'flagged':ad>0?'done':''}" data-i="${i}"><div class="pn">${p.name}</div><div class="pm">${p.code} · $${p.price} ea · Invoice: ${p.qty}</div><div class="pctrl"><div class="cg"><div class="l">Short</div><div class="stpr"><button onclick="adj('shorts',${i},-1,0,${p.qty})">&#8722;</button><span class="v${sh>0?' vr':''}">${sh}</span><button onclick="adj('shorts',${i},1,0,${p.qty})">+</button></div></div><div class="cg"><div class="l">Add</div><div class="stpr"><button onclick="adj('adds',${i},-1,0,50)">&#8722;</button><span class="v${ad>0?' vg':''}">${ad}</span><button onclick="adj('adds',${i},1,0,50)">+</button></div></div><div class="br"><div class="l" style="font-size:11px;color:var(--tm);text-align:right">Bringing</div><div class="big">${t}</div><div class="sm">$${(t*p.price).toFixed(0)}</div></div></div></div>`;});
  h+=`</div><div class="ab"><button class="btn btnp" onclick="goStep(2)">Head to market →</button></div>`;
  $('sc').innerHTML=h;
}
function r2(){
  const sales=totalSales(),logged=numLogged();
  let h=`<div class="sumbar"><div class="i"><div class="l">Sales so far</div><div class="v">$${sales.toFixed(0)}</div></div><div class="i" style="text-align:right"><div class="l">Logged</div><div class="v">${logged} / ${PRODUCTS.length}</div></div></div>`;
  h+=`<div class="sw"><input type="text" placeholder="Search products…" oninput="fl('ml',this.value)" autocomplete="off" autocorrect="off" spellcheck="false"></div>`;
  h+=`<div class="slbl">Enter trades &amp; leftovers</div><div id="ml">`;
  PRODUCTS.forEach((p,i)=>{const t=tb(p);
    if(t===0){h+=`<div class="pc so" data-i="${i}"><div class="pn">${p.name}</div><div class="pm" style="margin-bottom:0">Shorted out — not brought</div></div>`;return;}
    const tr=S.trades[p.code]||0,lo=S.leftovers[p.code]||0,su=Math.max(0,t-tr-lo),done=S.leftovers[p.code]!==undefined||S.trades[p.code]!==undefined;
    h+=`<div class="pc ${done?'done':''}" data-i="${i}"><div style="display:flex;justify-content:space-between;margin-bottom:2px"><div class="pn">${p.name}</div><span style="font-size:11px;font-weight:600;padding:2px 8px;border-radius:20px;background:${done?'var(--gl)':'var(--s2)'};color:${done?'#3B6D11':'var(--tm)'};">${done?'done':'pending'}</span></div><div class="pm">Brought: ${t} · $${(t*p.price).toFixed(0)}</div><div class="pctrl"><div class="cg"><div class="l">Trades</div><div class="stpr"><button onclick="adj('trades',${i},-1,0,${t})">&#8722;</button><span class="v">${tr}</span><button onclick="adj('trades',${i},1,0,${t})">+</button></div></div><div class="cg"><div class="l">Left over</div><div class="stpr"><button onclick="adj('leftovers',${i},-1,0,${t})">&#8722;</button><span class="v">${lo}</span><button onclick="adj('leftovers',${i},1,0,${t})">+</button></div></div><div class="sa"><div class="l" style="font-size:11px;color:var(--tm);text-align:right">Sold</div><div class="big">$${(su*p.price).toFixed(0)}</div><div class="sm">${su} units</div></div></div></div>`;});
  h+=`</div><div class="ab"><button class="btn btnp" onclick="goStep(3)">Reconcile cashbox →</button></div>`;
  $('sc').innerHTML=h;
}
function cbR(key,lbl){return `<div class="cbr"><span class="l">${lbl}</span><div class="cbi"><span class="sym">$</span><input type="number" inputmode="decimal" min="0" step="0.01" value="${S[key]||''}" placeholder="0.00" onchange="S.${key}=parseFloat(this.value)||0;saveState();r3()"></div></div>`;}
function r3(){
  const sales=totalSales(),col=S.cash+S.cards+S.checks,ded=S.discounts+S.marketFee+S.coins,exp=sales-ded,tu=col-exp,ps=pizzaSold(),pb=pizzaBonus();
  let h='<div class="slbl">Money collected</div>';
  h+=cbR('cash','Cash received');h+=cbR('cards','Credit card charges');h+=cbR('checks','Personal checks');
  h+=`<div class="cbr"><span class="l">Starting cash (float)</span><div class="cbi"><span class="sym">$</span><input type="number" inputmode="decimal" min="0" value="${S.startingCash}" onchange="S.startingCash=parseFloat(this.value)||0;saveState();r3()"></div></div>`;
  h+='<div class="slbl">Deductions</div>';
  h+=cbR('coins','Market coins / tokens');h+=cbR('marketFee','Market fee');h+=cbR('discounts','Discounts given');
  h+='<div class="slbl">Reconciliation</div>';
  h+=`<div class="rc"><div class="rr"><span>Total product sales</span><span>$${sales.toFixed(2)}</span></div><div class="rr"><span>Less deductions</span><span class="neg">($${ded.toFixed(2)})</span></div><div class="rr"><span>Expected receipts</span><span>$${exp.toFixed(2)}</span></div><div class="rr"><span>Money collected</span><span>$${col.toFixed(2)}</span></div><div class="rr"><span>True-up</span><span style="color:${tu>=0?'#27500A':'#A32D2D'}">${tu>=0?'+':''}$${tu.toFixed(2)}</span></div></div>`;
  h+=`<div class="tu ${tu>=0?'over':'short'}"><div class="tl">${tu>=0?'Over':'Short'}</div><div class="ta">${tu>=0?'+':''}$${Math.abs(tu).toFixed(2)}</div></div>`;
  if(ps>0)h+=`<div class="slbl">Pizza bonus</div><div class="rc"><div class="rr"><span>Total pizzas sold</span><span>${ps}</span></div><div class="rr"><span>Bonus (&gt;10 @ $2)</span><span style="color:#085041">$${pb.toFixed(2)}</span></div></div>`;
  h+='<div class="slbl">Notes</div>';
  h+=`<div class="nw"><label>Comments for the bakery</label><textarea rows="3" placeholder="e.g. trades were for Trish — women’s shelter…" onchange="S.notes=this.value;saveState()">${S.notes}</textarea></div>`;
  h+=`<div class="ab"><button class="btn btnp" onclick="fin()">Submit &amp; finish day</button></div>`;
  $('sc').innerHTML=h;
}
function fl(lid,q){const l=q.toLowerCase();document.querySelectorAll('#'+lid+' .pc').forEach((c,i)=>{const p=PRODUCTS[i];c.style.display=(p.name.toLowerCase().includes(l)||p.code.toLowerCase().includes(l))?'':'none'})}
function fin(){
  const sales=totalSales(),col=S.cash+S.cards+S.checks,ded=S.discounts+S.marketFee+S.coins,tu=col-(sales-ded),ps=pizzaSold(),pb=pizzaBonus(),ns=PRODUCTS.filter(p=>(S.shorts[p.code]||0)>0).length,lo=PRODUCTS.reduce((s,p)=>s+(S.leftovers[p.code]||0),0);
  $('dsm').innerHTML='<div style="text-align:center;padding:20px;color:#666">Submitting to bakery...</div>';
  showScreen('sd');
  const payload={market:MARKET_NAME,date:MARKET_DATE,reps:MARKET_REPS,target:MARKET_TARGET,notes:S.notes,cashbox:{cash:S.cash,cards:S.cards,checks:S.checks,coins:S.coins,marketFee:S.marketFee,discounts:S.discounts,startingCash:S.startingCash},products:PRODUCTS.map(p=>({code:p.code,name:p.name,invoiceQty:p.qty,price:p.price,pizza:p.pizza,short:S.shorts[p.code]||0,add:S.adds[p.code]||0,trades:S.trades[p.code]||0,leftover:S.leftovers[p.code]||0}))};
  fetch(BACKEND_URL,{method:'POST',body:JSON.stringify(payload)})
  .then(r=>r.json())
  .then(result=>{
    $('hs').textContent='Submitted';$('hs').style.cssText='background:#EAF3DE;color:#27500A';
    $('dsm').innerHTML='<div style="text-align:center;padding:16px 0 20px"><div style="font-size:40px">&#10003;</div><div style="font-size:16px;font-weight:600;color:#27500A;margin-top:8px">Data sent to bakery!</div><div style="font-size:13px;color:#666;margin-top:4px">Your worksheet has been saved.</div></div><div class="sg"><div class="sx"><div class="sl">Total sales</div><div class="sv">$'+sales.toFixed(0)+'</div></div><div class="sx"><div class="sl">True-up</div><div class="sv" style="color:'+(tu>=0?'#27500A':'#A32D2D')+'">'+(tu>=0?'+':'')+'$'+Math.abs(tu).toFixed(0)+'</div></div></div><div class="dr"><span>Shorts at departure</span><span>'+ns+' item'+(ns!==1?'s':'')+'</span></div><div class="dr"><span>Items left over</span><span>'+lo+' units</span></div>'+(ps>0?'<div class="dr"><span>Pizzas sold / bonus</span><span>'+ps+' / $'+pb.toFixed(0)+'</span></div>':'')+'<div class="dr"><span>Money collected</span><span>$'+col.toFixed(2)+'</span></div>';
    S={step:1,shorts:{},adds:{},trades:{},leftovers:{},cash:0,cards:0,checks:0,coins:0,marketFee:0,discounts:0,startingCash:100,notes:''};clearState();
  })
  .catch(err=>{$('dsm').innerHTML='<div style="background:#FCEBEB;color:#A32D2D;padding:16px;border-radius:10px"><strong>Could not reach bakery.</strong><br>Check your connection and try again.<br><br><button onclick="fin()" style="margin-top:8px;padding:10px 20px;background:#1D9E75;color:#fff;border:none;border-radius:8px;font-size:15px;cursor:pointer">Retry</button></div>';});
}
(function(){try{const sv=localStorage.getItem('whb_'+MARKET_NAME.replace(/\s+/g,'_'));if(sv){const b=$('resume-banner');if(b)b.style.display='block';}}catch(e){}})();
</script>
</body>
</html>
